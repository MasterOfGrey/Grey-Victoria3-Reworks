 alert_low_market_access_alert_hint: "您可以通过增加[SCOPE.GetRootScope.GetState.GetName] 的[concept_infrastructure] （可以通过建立[GetBuildingType('building_port').GetName] 或[GetBuildingType('building_usu_railway_line').GetName] 来实现）、[Concept('concept_decree', '$concept_decrees$')] （如[GetDecreeType('decree_road_maintenance').GetName] ）或确保[concept_market] 上有足够的[GetGoods('merchant_marine').GetName] 来将[SCOPE.GetRootScope.GetState.GetName] 连接到其海外的[concept_market_capital] 来改进[concept_market_access] 。" #deepl:1827145687
 ## Journal Texts
 #ip2_02
 je_indian_famines_button_relief_kitchens_desc: "\n\n 不过，这样的开支不太可能让财政部的好心人对我们产生好感，而且任何救济工作的效果都将受到国家能力和当地基础设施的制约。\n\n #bold  铁路#!\n [GetBuildingType('building_usu_railway_line').GetName] 在[concept_famine] 受灾地区[Concept('concept_state','$concept_states$')] ，这项措施的效果将加倍。" #deepl:795676007
 every_state_suffers_following_modifier: "每个患有[concept_famine] 的[concept_state] 都会获得以下修改器：\n （通过拥有[GetBuildingType('building_usu_railway_line').GetName] 得到改善）：" #deepl:588325104
 je_indian_famines_button_work_camps_desc: "我们不会建立一个依靠政府救济金生活的阶级。设立工作营，让赤贫者可以在那里赚取生活费，从而能够购买自己的食物。\n\n #bold  铁路#!\n 在[concept_famine]-stricken[Concept('concept_state','$concept_states$')] 中设立一个[GetBuildingType('building_usu_railway_line').GetName] ，将使这一措施的效果加倍。" #deepl:3023810712
 je_indian_famines_button_epidemic_control_desc: "虽然饥饿和营养不良仍是罪魁祸首，但瘟疫和霍乱等疾病才是导致大多数穷人丧生的罪魁祸首。\n\n 通过建立大规模疫苗接种和严格检疫制度，我们可以抵消一些最严重的死亡率增长。\n\n #bold  铁路#!\n [GetBuildingType('building_usu_railway_line').GetName] [concept_famine] [Concept('concept_state','$concept_states$')] ，这一措施的效果将加倍。" #deepl:1668531692
