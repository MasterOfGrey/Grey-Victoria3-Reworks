 concept_usu_railway_station_desc: "Una #b Terminal Ferroviaria#! es un edificio que sirve de centro neurálgico de su red logística. Es un edificio puramente civil y proporciona [GetGoods('usu_train_paths').GetName] y [GetGoods('usu_logistics').GetName] pero consume una variedad de bienes empezando por [GetGoods('tools').GetName], [GetGoods('paper').GetName], [GetGoods('aeroplanes').GetName] y [GetGoods('oil').GetName]. Más adelante también necesitará [GetGoods('electricity').GetName], [GetGoods('telephones').GetName] y [GetGoods('radios').GetName].\nSi tienes suficientes #b Aeropuertos#! se fundará un [concept_curtiss_airline] y con el crecimiento de tus #b Aeropuertos#!, la #b Aerolínea#! crecerá también y ofrecerá más bonificaciones." #deepl:775810903

 # Tooltips 
 usu_railway_station_can_construct_tt: "El nivel máximo de [Concept('concept_curtiss_airport','$concept_curtiss_airports$')] que puede soportar un estado es igual a 1 más 1 por cada #G 10 niveles#! de [GetBuildingType('building_urban_center').GetName]." #deepl:1884813676

