 ## UI
 alert_low_market_access_alert_hint: "Puede mejorar el [concept_market_access] de [SCOPE.GetRootScope.GetState.GetName] ya sea aumentando su [concept_infrastructure] (lo que puede hacerse construyendo [GetBuildingType('building_port').GetName] o [GetBuildingType('building_usu_railway_line').GetName]), [Concept('concept_decree', '$concept_decrees$')] como [GetDecreeType('decree_road_maintenance').GetName], o asegurándose de que hay suficiente [GetGoods('merchant_marine').GetName] en el [concept_market] para conectar [SCOPE.GetRootScope.GetState.GetName] a su [concept_market_capital] en el extranjero." #deepl:1827145687
 ## Journal Texts
 #ip2_02
 je_indian_famines_button_relief_kitchens_desc: "Aunque costosa, la forma lógica y quizás más eficaz de combatir las hambrunas es simplemente alimentar a los hambrientos.\n\n Sin embargo, es poco probable que estos gastos nos hagan caer bien a los buenos hombres del Tesoro, y la eficacia de cualquier esfuerzo de socorro se verá atascada por la capacidad del Estado y la infraestructura local.\n\n #bold  Ferrocarriles#!\n La presencia de un [GetBuildingType('building_usu_railway_line').GetName] en [concept_famine]-afectado [Concept('concept_state','$concept_states$')], duplicará los efectos de esta medida." #deepl:795676007
 every_state_suffers_following_modifier: "Cada [concept_state] que sufra [concept_famine] obtendrá el siguiente modificador:\n(mejorado por tener un [GetBuildingType('building_usu_railway_line').GetName]):" #deepl:588325104
 je_indian_famines_button_work_camps_desc: "No crearemos una clase de dependientes que vivan del paro gubernamental. Estableceremos campos de trabajo donde los pobres indigentes puedan ganar un salario digno, para que puedan comprar su propia comida.\n\n #bold  Ferrocarriles#!\n La presencia de un [GetBuildingType('building_usu_railway_line').GetName] en [concept_famine]-afectado [Concept('concept_state','$concept_states$')], duplicará los efectos de esta medida." #deepl:3023810712
 je_indian_famines_button_epidemic_control_desc: "Aunque el hambre y la malnutrición siguen siendo los principales responsables, es a causa de enfermedades como la peste y el cólera que la mayoría de los indigentes perderán la vida.\n\n Mediante la instauración de sistemas de vacunación masiva y cuarentenas estrictas podemos contrarrestar algunos de los peores aumentos de la mortalidad.\n\n #bold  Ferrocarriles#!\n La presencia de un [GetBuildingType('building_usu_railway_line').GetName] en [concept_famine] asolado [Concept('concept_state','$concept_states$')], duplicará los efectos de esta medida." #deepl:1668531692
 #ip2_03
