 ## UI
 alert_low_market_access_alert_hint: "Sie können die [concept_market_access] von [SCOPE.GetRootScope.GetState.GetName] verbessern, indem Sie entweder seine [concept_infrastructure] erhöhen (was durch den Bau von [GetBuildingType('building_port').GetName] oder [GetBuildingType('building_usu_railway_line').GetName] geschehen kann), durch [Concept('concept_decree', '$concept_decrees$')] wie [GetDecreeType('decree_road_maintenance').GetName] oder indem Sie sicherstellen, dass es genügend [GetGoods('merchant_marine').GetName] auf der [concept_market] gibt, um [SCOPE.GetRootScope.GetState.GetName] mit seinem [concept_market_capital] in Übersee zu verbinden." #deepl:1827145687
 ## Journal Texts
 #ip2_02
 je_indian_famines_button_relief_kitchens_desc: "Der logische und vielleicht wirksamste Weg zur Bekämpfung von Hungersnöten ist es, die Hungernden einfach zu ernähren, auch wenn dies teuer ist.\n\n Solche Ausgaben werden uns jedoch bei den Herren des Finanzministeriums kaum beliebt machen, und die Wirksamkeit jeglicher Hilfsbemühungen wird durch die staatlichen Kapazitäten und die lokale Infrastruktur beeinträchtigt.\n\n #bold  Eisenbahnen#!\n Die Präsenz eines [GetBuildingType('building_usu_railway_line').GetName] in [concept_famine]-geplagten [Concept('concept_state','$concept_states$')], wird die Wirkung dieser Maßnahme verdoppeln." #deepl:795676007
 every_state_suffers_following_modifier: "Jedes [concept_state], das an [concept_famine] leidet, erhält den folgenden Modifikator:\n(verbessert durch [GetBuildingType('building_usu_railway_line').GetName]):" #deepl:588325104
 je_indian_famines_button_work_camps_desc: "Wir werden keine Klasse von Abhängigen schaffen, die von der staatlichen Fürsorge leben. Richten Sie Arbeitslager ein, in denen die mittellosen Armen einen existenzsichernden Lohn verdienen können, damit sie ihre eigenen Lebensmittel kaufen können.\n\n #bold  Eisenbahnen#!\n Das Vorhandensein eines [GetBuildingType('building_usu_railway_line').GetName] in [concept_famine]-geplagten [Concept('concept_state','$concept_states$')], wird die Wirkung dieser Maßnahme verdoppeln." #deepl:3023810712
 je_indian_famines_button_epidemic_control_desc: "Zwar sind Hunger und Unterernährung nach wie vor die Hauptursache, aber durch Krankheiten wie Pest und Cholera verlieren die meisten Mittellosen ihr Leben.\n\n Durch die Einführung von Massenimpfungen und strengen Quarantänen können wir einige der schlimmsten Steigerungen der Sterblichkeitsrate ausgleichen.\n\n #bold  Eisenbahnen#!\n Das Vorhandensein eines [GetBuildingType('building_usu_railway_line').GetName] in [concept_famine]-geplagten [Concept('concept_state','$concept_states$')], wird die Wirkung dieser Maßnahme verdoppeln." #deepl:1668531692
