 concept_usu_railway_station_desc: "#b 鉄道ターミナル#! はあなたの物流ネットワークのハブとして機能する建物です。これは純粋な民間建物で、[GetGoods('usu_train_paths').GetName] と[GetGoods('usu_logistics').GetName] を供給しますが、[GetGoods('tools').GetName] 、[GetGoods('paper').GetName] 、[GetGoods('aeroplanes').GetName] 、[GetGoods('oil').GetName] から始まる様々な物資を消費します。後に[GetGoods('electricity').GetName],[GetGoods('telephones').GetName],[GetGoods('radios').GetName] も必要となります。\n #b  空港#! が十分にあれば[concept_curtiss_airline] が設立され、#b 空港#! の成長とともに#b 航空会社#! も成長し、より多くのボーナスを提供します。" #deepl:775810903

