 concept_usu_railway_station_desc: "Bir #b Demiryolu Terminali#! lojistik ağınızın merkezi olarak hizmet veren bir binadır. Tamamen sivil bir binadır ve [GetGoods('usu_train_paths').GetName] ve [GetGoods('usu_logistics').GetName] sağlar ancak [GetGoods('tools').GetName], [GetGoods('paper').GetName], [GetGoods('aeroplanes').GetName] ve [GetGoods('oil').GetName]'den başlayarak çeşitli mallar tüketir. Daha sonra [GetGoods('electricity').GetName], [GetGoods('telephones').GetName] ve [GetGoods('radios').GetName] 'a da ihtiyaç duyar.\nYeterli #b Havaalanınız varsa#! bir [concept_curtiss_airline] kurulacak ve büyüyen #b Havaalanlarınızla#!, #b Havayolu#! da büyüyecek ve daha fazla bonus sunacaktır." #deepl:775810903

