 ## UI
 alert_low_market_access_alert_hint: "[SCOPE.GetRootScope.GetState.GetName] 'un [concept_market_access] 'unu, [concept_infrastructure] 'unu artırarak (bu [GetBuildingType('building_port').GetName] veya [GetBuildingType('building_usu_railway_line').GetName] inşa ederek yapılabilir), [GetDecreeType('decree_road_maintenance').GetName] gibi [Concept('concept_decree', '$concept_decrees$')] ile veya [SCOPE.GetRootScope.GetState.GetName] 'u denizaşırı [concept_market_capital] 'una bağlamak için [concept_market] üzerinde yeterli [GetGoods('merchant_marine').GetName] olmasını sağlayarak geliştirebilirsiniz." #deepl:1827145687
 ## Journal Texts
 #ip2_02
 je_indian_famines_button_relief_kitchens_desc: "Pahalı olsa da, kıtlıklarla mücadele etmenin mantıklı ve belki de en etkili yolu açlık çekenleri doyurmaktır.\n\n Ancak bu tür harcamaların bizi Maliye'nin iyi adamlarına sevdirmesi pek olası değildir ve herhangi bir yardım çabasının etkinliği, devlet kapasitesi ve yerel altyapı tarafından darboğaza sokulacaktır.\n\n #bold  Demiryolları#!\n [concept_famine] -stricken [Concept('concept_state','$concept_states$')]'da bir [GetBuildingType('building_usu_railway_line').GetName] bulunması, bu önlemin etkilerini iki katına çıkaracaktır." #deepl:795676007
 every_state_suffers_following_modifier: "[concept_famine] 'dan muzdarip olan her [concept_state] aşağıdaki değiştiriciyi alacaktır:\n(bir [GetBuildingType('building_usu_railway_line').GetName]'a sahip olarak geliştirilmiştir):" #deepl:588325104
 je_indian_famines_button_work_camps_desc: "Devletin verdiği yardımlarla yaşayan bağımlı bir sınıf yaratmayacağız. Yoksulların kendi yiyeceklerini satın alabilmeleri için geçimlerini sağlayacak bir ücret kazanabilecekleri çalışma kampları kurun.\n\n #bold  Demiryolları#!\n [concept_famine] -stricken [Concept('concept_state','$concept_states$')]'da bir [GetBuildingType('building_usu_railway_line').GetName] bulunması, bu önlemin etkilerini iki katına çıkaracaktır." #deepl:3023810712
 je_indian_famines_button_epidemic_control_desc: "Açlık ve yetersiz beslenme temel suçlu olmaya devam ederken, veba ve kolera gibi hastalıklar nedeniyle yoksulların çoğu hayatını kaybedecektir.\n\n Toplu aşılama ve sıkı karantina sistemleri kurarak ölüm oranlarındaki en kötü artışlardan bazılarını telafi edebiliriz.\n\n #bold  Demiryolları#!\n [GetBuildingType('building_usu_railway_line').GetName] 'un [concept_famine]'dan etkilenen [Concept('concept_state','$concept_states$')]'daki varlığı, bu önlemin etkilerini iki katına çıkaracaktır." #deepl:1668531692
