 ## UI
 alert_low_market_access_alert_hint: "Vous pouvez améliorer [concept_market_access] de [SCOPE.GetRootScope.GetState.GetName] en augmentant [concept_infrastructure] (ce qui peut être fait en construisant [GetBuildingType('building_port').GetName] ou [GetBuildingType('building_usu_railway_line').GetName]), en [Concept('concept_decree', '$concept_decrees$')] comme [GetDecreeType('decree_road_maintenance').GetName], ou en veillant à ce qu'il y ait suffisamment de [GetGoods('merchant_marine').GetName] sur [concept_market] pour connecter [SCOPE.GetRootScope.GetState.GetName] à son [concept_market_capital] à l'étranger." #deepl:1827145687
 ## Journal Texts
 #ip2_02
 je_indian_famines_button_relief_kitchens_desc: "[concept_famine]Bien que coûteux, le moyen logique, et peut-être le plus efficace, de lutter contre les famines est tout simplement de nourrir ceux qui meurent de faim.\n\n De telles dépenses ne sont toutefois pas de nature à nous rendre sympathiques aux yeux de l'Échiquier, et l'efficacité de tout effort de secours sera limitée par la capacité de l'État et l'infrastructure locale.\n\n #bold  Chemins de fer#!\n La présence d'un [GetBuildingType('building_usu_railway_line').GetName] dans un [Concept('concept_state','$concept_states$')] frappé par la famine doublera les effets de cette mesure." #deepl:795676007
 every_state_suffers_following_modifier: "Chaque [concept_state] qui souffre de [concept_famine] recevra le modificateur suivant :\n(amélioré par la présence d'un [GetBuildingType('building_usu_railway_line').GetName]) :" #deepl:588325104
 je_indian_famines_button_work_camps_desc: "Nous ne créerons pas une classe de personnes dépendantes vivant de l'aide gouvernementale. Créer des camps de travail où les pauvres sans ressources peuvent gagner un salaire décent, afin de pouvoir acheter leur propre nourriture.\n\n #bold  Chemins de fer#!\n La présence d'un [GetBuildingType('building_usu_railway_line').GetName] dans [concept_famine]-stricken [Concept('concept_state','$concept_states$')], doublera les effets de cette mesure." #deepl:3023810712
 je_indian_famines_button_epidemic_control_desc: "Si la faim et la malnutrition restent les principaux coupables, c'est à cause de maladies comme la peste et le choléra que les plus démunis perdront la vie.\n\n En instituant des systèmes de vaccination de masse et de mise en quarantaine stricte, nous pouvons compenser certaines des pires augmentations de la mortalité.\n\n #bold  Chemins de fer#!\n La présence d'un [GetBuildingType('building_usu_railway_line').GetName] dans un [concept_famine]-stricken [Concept('concept_state','$concept_states$')], doublera les effets de cette mesure." #deepl:1668531692
 #ip2_03
