 ## UI
 alert_low_market_access_alert_hint: "Você pode melhorar o [concept_market_access] do [SCOPE.GetRootScope.GetState.GetName] aumentando seu [concept_infrastructure] (o que pode ser feito construindo [GetBuildingType('building_port').GetName] ou [GetBuildingType('building_usu_railway_line').GetName]), [Concept('concept_decree', '$concept_decrees$')] como [GetDecreeType('decree_road_maintenance').GetName], ou garantindo que haja [GetGoods('merchant_marine').GetName] suficiente no [concept_market] para conectar o [SCOPE.GetRootScope.GetState.GetName] ao seu [concept_market_capital] no exterior." #deepl:1827145687
 ## Journal Texts
 #ip2_02
 je_indian_famines_button_relief_kitchens_desc: "Embora dispendiosa, a maneira lógica e talvez mais eficaz de combater a fome é simplesmente alimentar os famintos.\n\n No entanto, é improvável que essas despesas nos tornem queridos pelos homens de bem do Tesouro, e a eficácia de qualquer esforço de socorro será prejudicada pela capacidade do estado e pela infraestrutura local.\n\n #bold  Ferrovias#!\n A presença de um [GetBuildingType('building_usu_railway_line').GetName] em [concept_famine]- assolado por [Concept('concept_state','$concept_states$')], dobrará os efeitos dessa medida." #deepl:795676007
 every_state_suffers_following_modifier: "Todo [concept_state] que sofre de [concept_famine] receberá o seguinte modificador:\n(aprimorado por ter um [GetBuildingType('building_usu_railway_line').GetName]):" #deepl:588325104
 je_indian_famines_button_work_camps_desc: "Não criaremos uma classe de dependentes que vivem de esmolas do governo. Estabeleça campos de trabalho onde os pobres destituídos possam ganhar um salário digno, para que possam comprar seus próprios alimentos.\n\n #bold  Ferrovias#!\n A presença de um [GetBuildingType('building_usu_railway_line').GetName] em [concept_famine]- assolado [Concept('concept_state','$concept_states$')], dobrará os efeitos dessa medida." #deepl:3023810712
 je_indian_famines_button_epidemic_control_desc: "Embora a fome e a desnutrição continuem sendo as principais culpadas, é por meio de doenças como a peste e a cólera que a maioria dos destituídos perderá a vida.\n\n Ao instituir sistemas de vacinação em massa e quarentena rigorosa, podemos compensar alguns dos piores aumentos de mortalidade.\n\n #bold  Ferrovias#!\n A presença de uma ferrovia [GetBuildingType('building_usu_railway_line').GetName] em [concept_famine]- assolada [Concept('concept_state','$concept_states$')], dobrará os efeitos dessa medida." #deepl:1668531692
 #ip2_03
