 ## UI
 alert_low_market_access_alert_hint: "You can improve the [concept_market_access] of [SCOPE.GetRootScope.GetState.GetName] by either increasing its [concept_infrastructure] (which can be done by building [GetBuildingType('building_port').GetName] or [GetBuildingType('building_usu_railway_line').GetName]), by [Concept('concept_decree', '$concept_decrees$')] like [GetDecreeType('decree_road_maintenance').GetName], or ensuring that there is enough [GetGoods('merchant_marine').GetName] on the [concept_market] to connect [SCOPE.GetRootScope.GetState.GetName] to its [concept_market_capital] overseas."
 ## Journal Texts
 #ip2_02
 je_indian_famines_button_relief_kitchens_desc: "While expensive, the logical, and perhaps most effective way to combat famines is to simply feed those starving.\n\nSuch expenses however, are unlikely to endear us to the good men of the Exchequer, and the effectiveness of any relief efforts will be bottlenecked by state capacity and local infrastructure.\n\n#bold Railways#!\nThe presence of a [GetBuildingType('building_usu_railway_line').GetName] in [concept_famine]-stricken [Concept('concept_state','$concept_states$')], will double the effects of this measure."
 every_state_suffers_following_modifier: "Every [concept_state] that suffers from [concept_famine] will get the following modifier:\n(improved by having a [GetBuildingType('building_usu_railway_line').GetName]):"
 je_indian_famines_button_work_camps_desc: "We will not create a class of dependents living on the government dole. Set up work camps where the destitute poor may earn a living wage, so that they can purchase their own food.\n\n#bold Railways#!\nThe presence of a [GetBuildingType('building_usu_railway_line').GetName] in [concept_famine]-stricken [Concept('concept_state','$concept_states$')], will double the effects of this measure."
 je_indian_famines_button_epidemic_control_desc: "While hunger and malnutrition remains the root culprit, it is through diseases like plague and cholera that most destitute will lose their lives.\n\nBy instituting systems of mass vaccinations and strict quarantining we can offset some of the worst increases in mortality.\n\n#bold Railways#!\nThe presence of a [GetBuildingType('building_usu_railway_line').GetName] in [concept_famine]-stricken [Concept('concept_state','$concept_states$')], will double the effects of this measure."
