 concept_usu_railway_stations: "Railway Terminals" #You can use this for plural: [Concept('concept_usu_railway_station','$concept_usu_railway_stations$')]
 concept_usu_railway_station_desc: "Железнодорожный терминал #b #! - это здание, которое служит узлом вашей логистической сети. Это чисто гражданское здание, которое предоставляет [GetGoods('usu_train_paths').GetName] и [GetGoods('usu_logistics').GetName], но потребляет различные товары, начиная с [GetGoods('tools').GetName], [GetGoods('paper').GetName], [GetGoods('aeroplanes').GetName] и [GetGoods('oil').GetName]. Позже ему также понадобятся [GetGoods('electricity').GetName], [GetGoods('telephones').GetName] и [GetGoods('radios').GetName].\nЕсли у вас достаточно #b аэропортов#!, будут основаны [concept_curtiss_airline], а с ростом #b аэропортов#! вырастет и #b авиакомпания#!, которая будет предлагать больше бонусов." #deepl:775810903

 # Tooltips 
 usu_railway_station_can_construct_tt: "Максимальный уровень [Concept('concept_curtiss_airport','$concept_curtiss_airports$')], который может поддерживать государство, равен 1 плюс 1 за каждые #G 10 уровней#! [GetBuildingType('building_urban_center').GetName] ." #deepl:1884813676

