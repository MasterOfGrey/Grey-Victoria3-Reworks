 ## UI
 alert_low_market_access_alert_hint: "Вы можете улучшить [concept_market_access] [SCOPE.GetRootScope.GetState.GetName] , либо увеличив его [concept_infrastructure] (что можно сделать, построив [GetBuildingType('building_port').GetName] или [GetBuildingType('building_usu_railway_line').GetName]), либо создав [Concept('concept_decree', '$concept_decrees$')], как [GetDecreeType('decree_road_maintenance').GetName], либо обеспечив достаточное количество [GetGoods('merchant_marine').GetName] на [concept_market], чтобы соединить [SCOPE.GetRootScope.GetState.GetName] с его [concept_market_capital] за границей." #deepl:1827145687
 ## Journal Texts
 #ip2_02
 je_indian_famines_button_relief_kitchens_desc: "Хотя это и дорого, логичный и, возможно, самый эффективный способ борьбы с голодом - просто накормить голодающих.\n\n Такие расходы, однако, вряд ли расположат нас к добрым людям из Казначейства, а эффективность любых усилий по оказанию помощи будет зависеть от возможностей государства и местной инфраструктуры.\n\n #bold  Железные дороги#!\n Наличие [GetBuildingType('building_usu_railway_line').GetName] в [concept_famine]-страдающем [Concept('concept_state','$concept_states$')], удвоит эффект от этой меры." #deepl:795676007
 every_state_suffers_following_modifier: "Каждый [concept_state], страдающий от [concept_famine], получает следующий модификатор:\n(улучшается наличием [GetBuildingType('building_usu_railway_line').GetName]):" #deepl:588325104
 je_indian_famines_button_work_camps_desc: "Мы не будем создавать класс иждивенцев, живущих на государственное пособие. Создайте рабочие лагеря, где обездоленные бедняки смогут зарабатывать на жизнь, чтобы иметь возможность покупать себе еду.\n\n #bold  Железные дороги#!\n Присутствие [GetBuildingType('building_usu_railway_line').GetName] в [concept_famine]-страдающем [Concept('concept_state','$concept_states$')], удвоит эффект от этой меры." #deepl:3023810712
 je_indian_famines_button_epidemic_control_desc: "Хотя голод и недоедание остаются основными виновниками, именно из-за таких болезней, как чума и холера, погибнет большинство обездоленных.\n\n Введя системы массовой вакцинации и строгого карантина, мы сможем компенсировать некоторые из самых серьезных увеличений смертности.\n\n #bold  Железные дороги#!\n Наличие [GetBuildingType('building_usu_railway_line').GetName] в [concept_famine]-страдающих [Concept('concept_state','$concept_states$')], удвоит эффект от этой меры." #deepl:1668531692
