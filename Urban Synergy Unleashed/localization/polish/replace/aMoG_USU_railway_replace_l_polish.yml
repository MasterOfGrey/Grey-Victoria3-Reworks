 ## UI
 alert_low_market_access_alert_hint: "Możesz ulepszyć [concept_market_access] z [SCOPE.GetRootScope.GetState.GetName] albo zwiększając jego [concept_infrastructure] (co można zrobić budując [GetBuildingType('building_port').GetName] lub [GetBuildingType('building_usu_railway_line').GetName]), przez [Concept('concept_decree', '$concept_decrees$')] jak [GetDecreeType('decree_road_maintenance').GetName], albo upewniając się, że na [concept_market] jest wystarczająco dużo [GetGoods('merchant_marine').GetName], aby połączyć [SCOPE.GetRootScope.GetState.GetName] z jego [concept_market_capital] za granicą." #deepl:1827145687
 ## Journal Texts
 #ip2_02
 je_indian_famines_button_relief_kitchens_desc: "Chociaż jest to kosztowne, logicznym i być może najskuteczniejszym sposobem walki z głodem jest po prostu nakarmienie głodujących.\n\n Takie wydatki jednak raczej nie przysporzą nam sympatii dobrych ludzi z ministerstwa skarbu, a skuteczność wszelkich wysiłków pomocowych będzie utrudniona przez możliwości państwa i lokalną infrastrukturę.\n\n #bold  Koleje#!\n Obecność [GetBuildingType('building_usu_railway_line').GetName] w [concept_famine]- dotkniętym [Concept('concept_state','$concept_states$')], podwoi efekty tego środka." #deepl:795676007
 every_state_suffers_following_modifier: "Każdy [concept_state] cierpiący na [concept_famine] otrzyma następujący modyfikator:\n(ulepszony przez posiadanie [GetBuildingType('building_usu_railway_line').GetName]):" #deepl:588325104
 je_indian_famines_button_work_camps_desc: "Nie będziemy tworzyć klasy osób zależnych, żyjących na rządowym zasiłku. Załóżmy obozy pracy, w których ubodzy bez środków do życia będą mogli zarabiać na życie, tak aby mogli kupować własne jedzenie.\n\n #bold  Koleje#!\n Obecność [GetBuildingType('building_usu_railway_line').GetName] w [concept_famine]- dotkniętym [Concept('concept_state','$concept_states$')], podwoi efekty tego środka." #deepl:3023810712
 je_indian_famines_button_epidemic_control_desc: "Podczas gdy głód i niedożywienie pozostają głównym winowajcą, to właśnie przez choroby takie jak dżuma i cholera większość ubogich straci życie.\n\n Wprowadzając systemy masowych szczepień i ścisłej kwarantanny, możemy zrównoważyć niektóre z najgorszych wzrostów śmiertelności.\n\n #bold  Koleje#!\n Obecność [GetBuildingType('building_usu_railway_line').GetName] w [concept_famine]- dotkniętych [Concept('concept_state','$concept_states$')], podwoi efekty tego środka." #deepl:1668531692
 #ip2_03
